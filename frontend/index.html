<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Banking Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    height: 100vh;
    font-family: Inter;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
}

.login-box {
    width: 380px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
}

.logo {
    width: 75px;
    height: 75px;
    margin: auto;
    background: linear-gradient(135deg, #fbbc05, #ffdd55);
    border-radius: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 34px;
    color: #0f172a;
    font-weight: bold;
    margin-bottom: 15px;
}

h2 {
    margin: 10px 0 5px;
}

p {
    font-size: 13px;
    color: #cbd5e1;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 13px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
}

input::placeholder {
    color: #94a3b8;
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #fbbc05, #ffd24d);
    color: #0f172a;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(251,188,5,0.3);
}

.footer {
    margin-top: 18px;
    font-size: 11px;
    color: #94a3b8;
}

@media (max-width: 420px) {
    .login-box {
        width: 90%;
        padding: 30px;
    }
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">🏛</div>

    <h2>Smart Banking System</h2>
    <p>Secure access to your banking dashboard</p>

    <input id="username" placeholder="Enter Username">
    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div class="footer">
        © 2026 Banking System • Secure Portal
    </div>

</div>

<script>
function login() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (user && pass) {
        window.location.href = "home.html";
    } else {
        alert("Please enter username and password");
    }
}
</script>
<script src="clock.js"></script>
</body>
</html>
